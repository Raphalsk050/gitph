name: Build desktop apps

# Runs on every push and on version tags (v*), and can be started by hand from
# the Actions tab with the "Run workflow" button — that button lets you pick
# which branch to build.
#
# When the pushed ref is a version tag (e.g. v0.3.1), the extra "release" job
# collects the installers from all three platforms and publishes a single
# GitHub Release for that tag.
on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
  workflow_dispatch:

# A newer push to the same ref cancels the in-progress build for that ref, so
# only the latest commit consumes runner minutes. Tags have unique refs, so a
# release build is never cancelled by a later branch push.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      # One platform failing must not cancel the others' builds.
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer, preload and main
        run: npm run build

      - name: Package with electron-builder
        run: npx --no-install electron-builder --${{ matrix.platform }} --publish never
        env:
          # No Apple signing certificate in CI: build an unsigned artifact
          # instead of failing while searching for an identity.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: gitph-${{ matrix.platform }}
          if-no-files-found: error
          retention-days: 14
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.blockmap
            release/latest*.yml

  release:
    name: Publish GitHub Release
    # Only run for version tags, and only once every platform build succeeded.
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      # Required for softprops/action-gh-release to create the release and
      # upload the installers.
      contents: write

    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          # No name filter: pulls every gitph-* artifact from the build job.
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Draft/prerelease left off so the release is published immediately.
          # A "-beta"/"-rc" suffix on the tag is auto-detected as a prerelease.
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/*.exe
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.AppImage
            artifacts/*.blockmap
            artifacts/latest*.yml
